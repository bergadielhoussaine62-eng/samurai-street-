<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Samurai Street</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#0a0908; --bg-alt:#151210; --bg-panel:#1c1815;
    --red:#af1f2a; --red-bright:#d92d3a;
    --gold:#c9a24a; --gold-bright:#e8c877;
    --cream:#f3ede1; --dim:#a89e8f; --line:#2c2621;
    --serif:'Shippori Mincho B1', serif; --sans:'Inter', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--cream);font-family:var(--sans);min-height:100vh;}
  .wrap{max-width:760px;margin:0 auto;padding:30px 18px 70px;}

  h1{font-family:var(--serif);font-size:1.5rem;margin-bottom:4px;}
  h1 span{color:var(--gold);}
  .subtitle{color:var(--dim);font-size:.85rem;margin-bottom:28px;}

  /* Login */
  #loginView{max-width:360px;margin:80px auto 0;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:.8rem;color:var(--gold);margin-bottom:6px;font-weight:600;}
  .field input{
    width:100%;background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;color:var(--cream);font-family:inherit;font-size:.95rem;
  }
  .field input:focus{outline:2px solid var(--gold);border-color:transparent;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 20px;border-radius:8px;font-weight:700;font-size:.9rem;
    text-decoration:none;cursor:pointer;border:none;width:100%;
    background:var(--red);color:#fff;transition:.2s;
  }
  .btn:hover{background:var(--red-bright);}
  .btn.gold{background:var(--gold);color:#1a1510;}
  .btn.gold:hover{background:var(--gold-bright);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);}
  .error-msg{color:var(--red-bright);font-size:.85rem;margin-top:12px;text-align:center;}

  /* Main app */
  #appView{display:none;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
  .logout-btn{background:none;border:1px solid var(--line);color:var(--dim);padding:8px 14px;
    border-radius:6px;font-size:.8rem;cursor:pointer;}

  .card{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:22px;}
  .card h2{font-family:var(--serif);font-size:1.1rem;margin-bottom:18px;color:var(--cream);}

  .grid2{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:600px){ .grid2{grid-template-columns:1fr 1fr;} }
  textarea{resize:vertical;min-height:70px;font-family:inherit;}

  .link-result{
    margin-top:16px;background:var(--bg);border:1px solid var(--gold);border-radius:8px;
    padding:14px 16px;font-size:.85rem;word-break:break-all;color:var(--gold);display:none;
  }
  .link-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .link-actions .btn{width:auto;flex:1;padding:10px 14px;font-size:.82rem;}

  /* Orders list */
  .order-row{
    border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:14px;
  }
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .order-name{font-weight:700;color:var(--cream);}
  .order-meta{color:var(--dim);font-size:.78rem;}
  .order-pack{color:var(--dim);font-size:.85rem;margin-bottom:14px;}

  .status-badge{
    display:inline-block;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .status-confirmed{background:rgba(168,158,143,.2);color:var(--dim);}
  .status-preparing{background:rgba(175,31,42,.2);color:var(--red-bright);}
  .status-onway{background:rgba(201,162,74,.2);color:var(--gold);}
  .status-delivered{background:rgba(90,160,90,.2);color:#7bc47f;}

  .status-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .status-btns button{
    flex:1;min-width:90px;background:var(--bg);border:1px solid var(--line);color:var(--dim);
    padding:9px 8px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;transition:.2s;
  }
  .status-btns button.current{background:var(--gold);color:#1a1510;border-color:var(--gold);}
  .status-btns button:hover:not(.current){border-color:var(--gold);color:var(--gold);}

  .track-link{color:var(--gold);font-size:.78rem;text-decoration:none;display:inline-block;margin-top:10px;}

  .empty-state{text-align:center;color:var(--dim);padding:30px;font-size:.9rem;}
</style>
</head>
<body>

<div class="wrap">

  <!-- LOGIN -->
  <div id="loginView">
    <h1 style="text-align:center;margin-bottom:6px;">Samurai <span>Street</span></h1>
    <p class="subtitle" style="text-align:center;">Espace admin — Suivi des commandes</p>
    <div class="card">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@exemple.com">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn" id="loginBtn">Se connecter</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appView">
    <div class="top-bar">
      <div>
        <h1>Samurai <span>Street</span></h1>
        <p class="subtitle">Gestion des commandes</p>
      </div>
      <button class="logout-btn" id="logoutBtn">Déconnexion</button>
    </div>

    <div class="card">
      <h2>➕ Nouvelle commande</h2>
      <div class="grid2">
        <div class="field">
          <label>Nom du client</label>
          <input type="text" id="newName" placeholder="Ex: Youssef">
        </div>
        <div class="field">
          <label>Téléphone (avec indicatif)</label>
          <input type="text" id="newPhone" placeholder="212600000000">
        </div>
      </div>
      <div class="field">
        <label>Résumé de la commande</label>
        <textarea id="newPack" placeholder="Ex: Pack Duo x1, Samurai Dragon x2"></textarea>
      </div>
      <div class="field">
        <label>Temps estimé (minutes, optionnel)</label>
        <input type="number" id="newEta" placeholder="Ex: 30">
      </div>
      <button class="btn gold" id="createBtn">Créer la commande</button>

      <div class="link-result" id="linkResult"></div>
      <div class="link-actions" id="linkActions" style="display:none;">
        <button class="btn ghost" id="copyLinkBtn">📋 Copier le lien</button>
        <a class="btn" id="sendWaBtn" target="_blank" style="text-decoration:none;text-align:center;">💬 Envoyer sur WhatsApp</a>
      </div>
    </div>

    <div class="card">
      <h2>📦 Commandes récentes</h2>
      <div id="ordersList"><div class="empty-state">Chargement...</div></div>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIfFeZYQSSxf2e12r3w0bJefivkY8wyxM",
  authDomain: "samurai-street.firebaseapp.com",
  projectId: "samurai-street",
  storageBucket: "samurai-street.firebasestorage.app",
  messagingSenderId: "93999537946",
  appId: "1:93999537946:web:998a7a29f77d81089d9a3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const TRACK_BASE_URL = window.location.origin + window.location.pathname.replace('admin.html', 'track.html');

const STATUS_LIST = [
  { key:'confirmed', label:'Confirmée' },
  { key:'preparing', label:'Préparation' },
  { key:'onway', label:'En route' },
  { key:'delivered', label:'Livrée' }
];

/* ---------- AUTH ---------- */
document.getElementById('loginBtn').addEventListener('click', () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  auth.signInWithEmailAndPassword(email, password).catch(err => {
    errEl.textContent = "Email ou mot de passe incorrect.";
  });
});

document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('appView').style.display = 'block';
    listenOrders();
  } else {
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('appView').style.display = 'none';
  }
});

/* ---------- CREATE ORDER ---------- */
document.getElementById('createBtn').addEventListener('click', async () => {
  const clientName = document.getElementById('newName').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  const packSummary = document.getElementById('newPack').value.trim();
  const etaVal = document.getElementById('newEta').value.trim();

  if(!clientName){ alert('Entrez le nom du client.'); return; }

  const btn = document.getElementById('createBtn');
  btn.disabled = true; btn.textContent = 'Création...';

  try{
    const docRef = await db.collection('orders').add({
      clientName,
      phone,
      packSummary,
      etaMinutes: etaVal ? parseInt(etaVal, 10) : null,
      status: 'confirmed',
      confirmedAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    const trackUrl = `${TRACK_BASE_URL}?order=${docRef.id}`;
    const linkResult = document.getElementById('linkResult');
    linkResult.textContent = trackUrl;
    linkResult.style.display = 'block';

    const linkActions = document.getElementById('linkActions');
    linkActions.style.display = 'flex';

    document.getElementById('copyLinkBtn').onclick = () => {
      navigator.clipboard.writeText(trackUrl);
      document.getElementById('copyLinkBtn').textContent = '✓ Copié !';
      setTimeout(() => { document.getElementById('copyLinkBtn').textContent = '📋 Copier le lien'; }, 1800);
    };

    const waMessage = encodeURIComponent(
      `Bonjour ${clientName} 👋\nVotre commande Samurai Street est confirmée !\nSuivez-la en direct ici :\n${trackUrl}`
    );
    const waPhone = phone.replace(/\D/g,'');
    document.getElementById('sendWaBtn').href = waPhone
      ? `https://wa.me/${waPhone}?text=${waMessage}`
      : `https://wa.me/?text=${waMessage}`;

    // reset form
    document.getElementById('newName').value = '';
    document.getElementById('newPhone').value = '';
    document.getElementById('newPack').value = '';
    document.getElementById('newEta').value = '';

  }catch(err){
    alert('Erreur : ' + err.message);
  }
  btn.disabled = false; btn.textContent = 'Créer la commande';
});

/* ---------- ORDERS LIST ---------- */
function listenOrders(){
  db.collection('orders').orderBy('createdAt','desc').limit(25)
    .onSnapshot(snapshot => {
      const list = document.getElementById('ordersList');
      if(snapshot.empty){
        list.innerHTML = '<div class="empty-state">Aucune commande pour le moment.</div>';
        return;
      }
      list.innerHTML = '';
      snapshot.forEach(doc => {
        const data = doc.data();
        const id = doc.id;
        const trackUrl = `${TRACK_BASE_URL}?order=${id}`;
        const createdDate = data.createdAt ? data.createdAt.toDate().toLocaleString('fr-FR') : '';

        const row = document.createElement('div');
        row.className = 'order-row';
        row.innerHTML = `
          <div class="order-top">
            <div>
              <div class="order-name">${data.clientName || '(sans nom)'}</div>
              <div class="order-meta">${data.phone || ''} · ${createdDate}</div>
            </div>
            <span class="status-badge status-${data.status}">${STATUS_LIST.find(s=>s.key===data.status)?.label || data.status}</span>
          </div>
          <div class="order-pack">${data.packSummary || ''}${data.etaMinutes ? ' · ETA: ' + data.etaMinutes + ' min' : ''}</div>
          <div class="status-btns"></div>
          <a class="track-link" href="${trackUrl}" target="_blank">🔗 Voir la page de suivi</a>
        `;

        const btnsWrap = row.querySelector('.status-btns');
        STATUS_LIST.forEach(s => {
          const b = document.createElement('button');
          b.textContent = s.label;
          if(s.key === data.status) b.classList.add('current');
          b.addEventListener('click', () => {
            db.collection('orders').doc(id).update({ status: s.key, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
          });
          btnsWrap.appendChild(b);
        });

        list.appendChild(row);
      });
    }, err => {
      document.getElementById('ordersList').innerHTML = '<div class="empty-state">Erreur de chargement.</div>';
      console.error(err);
    });
}
</script>

</body>
</html>
